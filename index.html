<!DOCTYPE html>
<html>
<head>
<title>Kabir 💖</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
  text-align:center;
  color:white;
}

.page {
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.hidden { display:none; }

/* BACKGROUNDS */
#p1 { background: linear-gradient(black, purple); }
#p2 { background: linear-gradient(#1e3c72, #2a5298); }
#p3 { background: black; }
#p4 { background: linear-gradient(#ff416c, #ff4b2b); }
#p5 { background: linear-gradient(#11998e, #38ef7d); }
#p6 { background: linear-gradient(#8360c3, #2ebf91); }
#p7 { background: linear-gradient(#ff9966, #ff5e62); }
#p8 { background: linear-gradient(#42275a, #734b6d); }
#p9 { background: linear-gradient(#000000, #0f2027); }
#p10 { background: linear-gradient(#232526, #414345); }
#p11 { background: linear-gradient(#000000, #434343); }
#p12 { background: linear-gradient(#141e30, #243b55); }
#p13 { background: black; }

img {
  width:260px;
  border-radius:20px;
  margin-bottom:10px;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bg" loop>
  <source src="bb.mp3">
</audio>

<audio id="meme">
  <source src="meme.MP3">
</audio>

<audio id="noSound">
  <source src="no.mp3">
</audio>

<!-- PAGE 1 -->
<div class="page" id="p1">
  <img src="photo1.jpeg">
  <h1>Yaare Yaare 😎</h1>
  <button onclick="next(1)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="p2">
  <h1>Welcome to the Domain 🌐</h1>
  <p>Do you want to know about me?</p>
  <button onclick="yes()">Yes</button>
  <button onclick="no()">No</button>
</div>

<!-- WRONG PAGE -->
<div class="page hidden" id="p3">
  <h1 style="color:red;">Wrong Choice 😈</h1>
</div>

<!-- NAME -->
<div class="page hidden" id="p4">
  <img src="photo5.jpeg">
  <h1>name:-Kabir Kumar Bay 💖</h1>
  <button onclick="next(4)">Next</button>
</div>

<!-- INFO -->
<div class="page hidden" id="p5">
  <h2>I live in Assam, Guwahati 🌍</h2>
  <button onclick="next(5)">Next</button>
</div>

<div class="page hidden" id="p6">
  <h2>Dharti mein aane ka din 🎂</h2>
  <h1>20/07/2009</h1>
  <button onclick="next(6)">Next</button>
</div>

<!-- HOBBIES -->
<div class="page hidden" id="p7">
  <h1>My Hobbies 😎</h1>
  <button onclick="next(7)">Next</button>
</div>

<div class="page hidden" id="p8">
  <img src="photo3.jpeg">
  <h1>🎮 Gaming</h1>
  <button onclick="next(8)">Next</button>
</div>

<div class="page hidden" id="p9">
  <img src="photo4.jpeg">
  <h1>😴 Sleeping</h1>
  <button onclick="next(9)">Next</button>
</div>

<div class="page hidden" id="p10">
  <h1>😏 Annoying others 🤧</h1>
  <button onclick="next(10)">Next</button>
</div>

<!-- END -->
<div class="page hidden" id="p11">
  <img src="photo6.jpeg">
  <h1>The story doesn't end here 💖</h1>
</div>

<script>

// NEXT FUNCTION
function next(n){
  document.getElementById("p"+n).classList.add("hidden");
  document.getElementById("p"+(n+1)).classList.remove("hidden");
}

// YES → next normal flow
function yes(){
  document.getElementById("p2").classList.add("hidden");
  document.getElementById("p4").classList.remove("hidden");
}

// NO → wrong page
function no(){
  document.getElementById("bg").pause();
  document.getElementById("noSound").play();
  document.getElementById("p2").classList.add("hidden");
  document.getElementById("p3").classList.remove("hidden");
}

// CLICK → BG MUSIC
document.body.addEventListener("click", function () {
  document.getElementById("bg").play();
}, { once: true });

// END MEME
setInterval(()=>{
  let p11=document.getElementById("p11");
  if(p11 && !p11.classList.contains("hidden")){
    document.getElementById("bg").pause();
    document.getElementById("meme").play();
  }
},500);

</script>

</body>
</html>
